app = "aiassistant"
primary_region = "gru"       # São Paulo — closest to Canada/Brazil user
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
